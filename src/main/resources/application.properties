# Server config
server.port=8080
# Application name
spring.application.name=FPTU_Library_System

# Datasource config
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=hsf302_library;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
logging.level.org.springframework.security=DEBUG

# JPA & Hibernate config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL Initialization
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# DEVTOOLS
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=true

# Mail Config
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=dummy@gmail.com
spring.mail.password=dummy
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# AWS S3 Configuration
spring.profiles.include=secret

aws.s3.access-key=dummy-access-key
aws.s3.secret-key=dummy-secret-key
aws.s3.region=ap-southeast-1
aws.s3.bucket-name=dummy-bucket

# PayOS Configuration
payos.client-id=YOUR_CLIENT_ID
payos.api-key=YOUR_API_KEY
payos.checksum-key=YOUR_CHECKSUM_KEY
payos.return-url=http://localhost:8080/reader/fines/pay/success
payos.cancel-url=http://localhost:8080/reader/fines/pay/cancel
payos.mock-enabled=true

borrow.request.expire-days=3
borrow.request.borrow-days=30