<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử nộp phạt</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div class="card shadow-sm">
            <div class="card-header d-flex align-items-center gap-2">
                <i class="bi bi-receipt fs-5 text-success"></i>
                <h4 class="mb-0">Lịch sử nộp phạt</h4>
            </div>
            <div class="card-body">
                <form method="get"
                      th:action="@{/reader/fines/payments}"
                      class="row g-3 mb-4">
                    <input type="hidden" name="page" value="0">
                    <div class="col-md-6">
                        <input type="text"
                               name="bookTitle"
                               class="form-control"
                               placeholder="Tìm theo tên sách..."
                               th:value="${search.bookTitle}">
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-search me-1"></i>Tìm kiếm
                        </button>
                    </div>
                    <div class="col-md-3">
                        <a th:href="@{/reader/fines/payments}" class="btn btn-outline-secondary w-100">
                            <i class="bi bi-arrow-counterclockwise me-1"></i>Đặt lại
                        </a>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>STT</th>
                            <th>Mã phiếu phạt</th>
                            <th>Sách</th>
                            <th>Lý do</th>
                            <th>Số tiền</th>
                            <th>Ngày nộp</th>
                            <th>Phương thức</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(payments)}">
                            <td colspan="7" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-4 d-block mb-2"></i>
                                Bạn chưa có lịch sử nộp phạt nào.
                            </td>
                        </tr>
                        <tr th:each="payment, stat : ${payments}">
                            <td th:text="${paymentPage.number * paymentPage.size + stat.count}">1</td>
                            <td th:text="${payment.fineId}">1</td>
                            <td th:text="${payment.bookTitle}">Sách</td>
                            <td th:text="${payment.reason}">Lý do</td>
                            <td th:text="${#numbers.formatDecimal(payment.amount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
                            <td th:text="${payment.paymentDate != null ? #temporals.format(payment.paymentDate, 'dd/MM/yyyy HH:mm') : '-'}">-</td>
                            <td>
                                <span class="badge bg-primary" th:text="${payment.paymentMethod}">PAYOS</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div th:replace="~{fragments/fine-pagination :: paymentHistoryPagination(paymentPage=${paymentPage}, search=${search})}"></div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
