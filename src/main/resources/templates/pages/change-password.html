<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Đổi mật khẩu</title>
</head>

<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-sm">
                    <div class="card-header">
                        <h4 class="mb-0">Đổi mật khẩu</h4>
                    </div>
                    <div class="card-body">
                        <!-- Success Message -->
                        <div th:if="${success}"
                             class="alert alert-success">
                            <i class="bi bi-check-circle-fill me-2"></i>
                            Đổi mật khẩu thành công
                        </div>
                        <!-- Error Message -->
                        <div th:if="${error}"
                             class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <span th:text="${error}"></span>
                        </div>
                        <form id="changePasswordForm"
                              th:action="@{/change-password}"
                              method="post"
                              th:object="${changePasswordRequest}">
                            <!-- Mật khẩu hiện tại -->
                            <div class="mb-3">
                                <label for="oldPassword"
                                       class="form-label">
                                    Mật khẩu hiện tại <span class="text-danger">*</span>
                                </label>
                                <input type="password"
                                       class="form-control"
                                       id="oldPassword"
                                       th:field="*{oldPassword}">
                                <div id="oldPasswordError"
                                     class="text-danger small mt-1"></div>
                                <div th:if="${#fields.hasErrors('oldPassword')}"
                                     th:errors="*{oldPassword}"
                                     class="text-danger small mt-1">
                                </div>
                            </div>
                            <!-- Mật khẩu mới -->
                            <div class="mb-3">
                                <label for="newPassword"
                                       class="form-label">
                                    Mật khẩu mới <span class="text-danger">*</span>
                                </label>
                                <input type="password"
                                       class="form-control"
                                       id="newPassword"
                                       th:field="*{newPassword}">
                                <div class="form-text">
                                    Mật khẩu phải có ít nhất 8 ký tự
                                </div>
                                <div id="newPasswordError"
                                     class="text-danger small mt-1"></div>
                                <div th:if="${#fields.hasErrors('newPassword')}"
                                     th:errors="*{newPassword}"
                                     class="text-danger small mt-1">
                                </div>
                            </div>
                            <!-- Xác nhận mật khẩu -->
                            <div class="mb-3">
                                <label for="confirmPassword"
                                       class="form-label">
                                    Xác nhận mật khẩu mới <span class="text-danger">*</span>
                                </label>
                                <input type="password"
                                       class="form-control"
                                       id="confirmPassword"
                                       th:field="*{confirmPassword}">
                                <div id="confirmPasswordError"
                                     class="text-danger small mt-1"></div>
                                <div th:if="${#fields.hasErrors('confirmPassword')}"
                                     th:errors="*{confirmPassword}"
                                     class="text-danger small mt-1">
                                </div>
                            </div>
                            <button type="submit"
                                    class="btn btn-primary w-100">
                                Đổi mật khẩu
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/form-validator.js}"></script>
    <script>
        document.getElementById("changePasswordForm")
            .addEventListener("submit", function(e) {
                let valid = true;
                valid = FormValidator.required(
                    "oldPassword",
                    "oldPasswordError",
                    "Vui lòng nhập mật khẩu hiện tại"
                ) && valid;
                valid = FormValidator.required(
                    "newPassword",
                    "newPasswordError",
                    "Vui lòng nhập mật khẩu mới"
                ) && valid;
                valid = FormValidator.required(
                    "confirmPassword",
                    "confirmPasswordError",
                    "Vui lòng xác nhận mật khẩu mới"
                ) && valid;

                const newPassword = document.getElementById("newPassword").value;
                if (newPassword) {
                    valid = FormValidator.minLength(
                        "newPassword",
                        "newPasswordError",
                        8,
                        "Mật khẩu phải có ít nhất 8 ký tự"
                    ) && valid;
                }
                const confirmPassword = document.getElementById("confirmPassword").value;
                if (confirmPassword && newPassword !== confirmPassword) {
                    const error = document.getElementById("confirmPasswordError");
                    error.textContent = "Mật khẩu xác nhận không khớp";
                    error.style.display = "block";
                    valid = false;
                }
                if (!valid) {
                    e.preventDefault();
                }
            });
    </script>
</div>

</body>
</html>
