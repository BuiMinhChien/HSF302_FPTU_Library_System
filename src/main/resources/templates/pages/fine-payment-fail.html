<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán thất bại</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <i class="bi bi-x-circle-fill text-danger" style="font-size: 4rem;"></i>
                <h3 class="mt-3">Thanh toán thất bại</h3>
                <p class="text-muted">
                    Giao dịch chưa được xác nhận. Khoản phạt vẫn ở trạng thái chưa thanh toán.
                </p>
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <a th:href="@{/reader/fines}" class="btn btn-outline-primary mt-3">
                    <i class="bi bi-arrow-left me-1"></i> Thử lại
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
