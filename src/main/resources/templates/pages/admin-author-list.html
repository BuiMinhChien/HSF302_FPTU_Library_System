<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Tác giả (Admin)</title>
</head>

<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div class="card shadow-sm">

            <div class="card-header d-flex justify-content-between align-items-center">
                <h4 class="mb-0">
                    Danh sách tác giả
                </h4>
                <a th:href="@{/admin/authors/add}" class="btn btn-primary">
                    Thêm tác giả
                </a>
            </div>

            <div class="card-body">
                <form method="get" th:action="@{/admin/authors}" class="row g-3 mb-3">
                    <div class="col-md-8">
                        <label class="form-label fw-semibold small mb-1">Từ khóa</label>
                        <input type="text" name="keyword" class="form-control"
                               th:value="${keyword}" placeholder="Tìm theo tên tác giả hoặc tiểu sử...">
                    </div>
                    <div class="col-md-2 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-search me-1"></i>Tìm kiếm
                        </button>
                    </div>
                    <div class="col-md-2 d-flex align-items-end gap-2">
                        <a th:href="@{/admin/authors}" class="btn btn-outline-secondary w-100">
                            <i class="bi bi-arrow-counterclockwise me-1"></i>Đặt lại
                        </a>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>STT</th>
                            <th class="text-center" style="width: 80px;">Ảnh</th>
                            <th>Tên tác giả</th>
                            <th style="width: 45%;">Tiểu sử</th>
                            <th class="text-center">Số sách</th>
                            <th class="text-center" style="width: 120px;">Tùy chọn</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(authors)}">
                            <td colspan="6" class="text-center text-muted">
                                Chưa có tác giả nào
                            </td>
                        </tr>
                        <tr th:each="author, stat : ${authors}">
                            <td th:text="${authorPage.number * authorPage.size + stat.count}"></td>

                            <td class="text-center">
                                <img th:if="${author.avatarUrl != null and !#strings.isEmpty(author.avatarUrl)}"
                                     th:src="${author.avatarUrl}"
                                     alt="Avatar"
                                     class="rounded-circle object-fit-cover border shadow-sm"
                                     style="width: 40px; height: 40px;">
                                <i th:unless="${author.avatarUrl != null and !#strings.isEmpty(author.avatarUrl)}"
                                   class="bi bi-person-circle fs-3 text-secondary"></i>
                            </td>

                            <td>
                                <strong th:text="${author.authorName}"></strong>
                            </td>
                            <td>
                                <div class="text-truncate" style="max-width: 400px;" th:text="${author.biography ?: '-'}"></div>
                            </td>
                            <td class="text-center">
                                <span class="badge bg-info text-dark" th:text="${(author.bookCount ?: 0) + ' cuốn'}"></span>
                            </td>
                            <td class="text-center">
                                <div class="d-flex gap-2 justify-content-center">
                                    <a th:href="@{/admin/authors/edit/{id}(id=${author.authorId})}"
                                       class="btn btn-sm btn-outline-primary"
                                       title="Sửa thông tin">
                                        <i class="bi bi-pencil-square"></i>
                                    </a>
                                    <form th:id="'deleteForm-' + ${author.authorId}" method="post" th:action="@{/admin/authors/delete/{id}(id=${author.authorId})}">
                                        <button type="button" class="btn btn-sm btn-outline-danger btn-delete-author"
                                                title="Xóa tác giả"
                                                th:data-form-id="'deleteForm-' + ${author.authorId}"
                                                th:data-author-name="${author.authorName}"
                                                th:data-book-count="${author.bookCount ?: 0}">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <div class="text-muted">
                            Hiển thị
                            <span th:text="${authorPage.totalElements > 0 ? authorPage.number * authorPage.size + 1 : 0}"></span>
                            -
                            <span th:text="${authorPage.number * authorPage.size + authors.size()}"></span>
                            trên tổng
                            <span th:text="${authorPage.totalElements}"></span>
                            dòng
                        </div>
                        <nav th:if="${authorPage.totalPages > 1}">
                            <ul class="pagination mb-0">
                                <li class="page-item" th:classappend="${authorPage.first} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/authors(page=${authorPage.number - 1}, keyword=${keyword})}" aria-label="Previous">
                                        Trước
                                    </a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, authorPage.totalPages - 1)}" th:classappend="${i == authorPage.number} ? 'active'">
                                    <a class="page-link" th:text="${i + 1}" th:href="@{/admin/authors(page=${i}, keyword=${keyword})}"></a>
                                </li>
                                <li class="page-item" th:classappend="${authorPage.last} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/authors(page=${authorPage.number + 1}, keyword=${keyword})}" aria-label="Next">
                                        Sau
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Confirm Modal Dùng Chung Cho Việc Xóa Tác Giả -->
    <div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title"><i class="bi bi-exclamation-triangle-fill me-2"></i>Xác nhận xóa</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="deleteModalBody">
                    Nội dung thông báo xác nhận sẽ hiển thị ở đây...
                </div>
                <div class="modal-footer p-3 d-flex justify-content-end gap-2 border-top">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy bỏ</button>
                    <button type="button" id="btnDeleteModalSubmit" class="btn btn-danger">Xóa tác giả</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast thông báo -->
    <div class="toast-container position-fixed bottom-0 start-0 p-3">
        <div th:if="${success}" id="successToast" class="toast text-bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${success}"></span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
        <div th:if="${error}" id="errorToast" class="toast text-bg-danger border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${error}"></span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Khởi tạo Toast
            const successToast = document.getElementById('successToast');
            if (successToast) {
                new bootstrap.Toast(successToast, { delay: 5000 }).show();
            }
            const errorToast = document.getElementById('errorToast');
            if (errorToast) {
                new bootstrap.Toast(errorToast, { delay: 5000 }).show();
            }

            // Xử lý Modal Xác Nhận Xóa
            let targetFormId = null;
            const deleteModal = new bootstrap.Modal(document.getElementById('confirmDeleteModal'));
            const deleteModalBody = document.getElementById('deleteModalBody');
            const btnDeleteModalSubmit = document.getElementById('btnDeleteModalSubmit');

            document.querySelectorAll('.btn-delete-author').forEach(button => {
                button.addEventListener('click', function () {
                    targetFormId = this.getAttribute('data-form-id');
                    const authorName = this.getAttribute('data-author-name');
                    deleteModalBody.innerHTML = `Bạn có chắc chắn muốn xóa tác giả <strong>${authorName}</strong> không?<br><small class="text-muted">Hành động này không thể hoàn tác</small>`;
                    btnDeleteModalSubmit.classList.remove('d-none');
                    deleteModal.show();
                });
            });

            btnDeleteModalSubmit.addEventListener('click', function () {
                if (targetFormId) {
                    document.getElementById(targetFormId).submit();
                }
            });
        });
    </script>
</div>
</body>
</html>
