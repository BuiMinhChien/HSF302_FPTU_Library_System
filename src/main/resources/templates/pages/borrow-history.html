<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử mượn sách</title>
</head>

<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div class="card shadow-sm">
            <div class="card-header">
                <h4 class="mb-0">
                    Lịch sử mượn sách
                </h4>
            </div>
            <div class="card-body">
                <form method="get"
                      th:action="@{/borrow-history}"
                      class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold small mb-1">Từ khóa</label>
                        <input type="text"
                               name="keyword"
                               class="form-control"
                               placeholder="Nhập tên sách hoặc mã Barcode..."
                               th:value="${keyword}"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold small mb-1">Từ ngày mượn</label>
                        <input type="date"
                               name="fromDate"
                               class="form-control"
                               th:value="${fromDate}"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold small mb-1">Đến ngày mượn</label>
                        <input type="date"
                               name="toDate"
                               class="form-control"
                               th:value="${toDate}"/>
                    </div>
                    <div class="col-md-2 d-flex align-items-end gap-2">
                        <button type="submit"
                                class="btn btn-primary w-100">
                            <i class="bi bi-search me-1"></i> Tìm
                        </button>
                        <a th:href="@{/borrow-history}"
                           class="btn btn-outline-secondary" title="Đặt lại">
                            <i class="bi bi-arrow-counterclockwise"></i>
                        </a>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>STT</th>
                            <th>Tên sách</th>
                            <th>Barcode bản copy</th>
                            <th>Ngày mượn</th>
                            <th>Hạn trả</th>
                            <th>Ngày trả thực tế</th>
                            <th>Trạng thái</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(histories)}">
                            <td colspan="7" class="text-center text-muted">
                                Bạn chưa có lịch sử mượn sách nào.
                            </td>
                        </tr>
                        <tr th:each="history, stat : ${histories}">
                            <td th:text="${historyPage.number * historyPage.size + stat.count}"></td>
                            <td th:text="${history.copy.book.title}"></td>
                            <td>
                                <span class="badge bg-light text-dark border"
                                      th:text="${history.copy.barcode}">
                                </span>
                            </td>
                            <td>
                                <div th:if="${history.borrowDate != null}">
                                    <div class="fw-semibold"
                                         th:text="${#temporals.format(history.borrowDate, 'MM/dd/yyyy')}">
                                    </div>
                                    <small class="text-muted"
                                           th:text="${#temporals.format(history.borrowDate, 'HH:mm:ss')}">
                                    </small>
                                </div>
                                <span th:if="${history.borrowDate == null}">-</span>
                            </td>
                            <td>
                                <div th:if="${history.dueDate != null}">
                                    <div class="fw-semibold"
                                         th:text="${#temporals.format(history.dueDate, 'MM/dd/yyyy')}">
                                    </div>
                                    <small class="text-muted"
                                           th:text="${#temporals.format(history.dueDate, 'HH:mm:ss')}">
                                    </small>
                                </div>
                                <span th:if="${history.dueDate == null}">-</span>
                            </td>
                            <td>
                                <div th:if="${history.returnDate != null}">
                                    <div class="fw-semibold"
                                         th:text="${#temporals.format(history.returnDate, 'MM/dd/yyyy')}">
                                    </div>
                                    <small class="text-muted"
                                           th:text="${#temporals.format(history.returnDate, 'HH:mm:ss')}">
                                    </small>
                                </div>
                                <span th:if="${history.returnDate == null}" class="text-muted">-</span>
                            </td>
                            <td>
                                <span th:if="${history.returnDate != null and history.returnDate.isBefore(history.dueDate)}"
                                      class="badge bg-success">
                                    Đã trả đúng hạn
                                </span>
                                <span th:if="${history.returnDate != null and !history.returnDate.isBefore(history.dueDate)}"
                                      class="badge bg-warning text-dark">
                                    Trả trễ hạn
                                </span>
                                <span th:if="${history.returnDate == null}"
                                      class="badge bg-secondary">
                                    Chưa trả
                                </span>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <div class="text-muted">
                            Hiển thị
                            <span th:text="${historyPage.number * historyPage.size + 1}"></span>
                            -
                            <span th:text="${historyPage.number * historyPage.size + histories.size()}"></span>
                            trên tổng
                            <span th:text="${historyPage.totalElements}"></span>
                            dòng
                        </div>
                        <nav th:if="${historyPage.totalPages > 1}">
                            <ul class="pagination mb-0">
                                <li class="page-item"
                                    th:classappend="${historyPage.first} ? 'disabled'">
                                    <a class="page-link"
                                       th:href="@{/borrow-history(
                                            page=${historyPage.number - 1},
                                            keyword=${keyword},
                                            fromDate=${fromDate},
                                            toDate=${toDate}
                                        )}" aria-label="Previous">
                                        Trước
                                    </a>
                                </li>
                                <li class="page-item"
                                    th:each="i : ${#numbers.sequence(0, historyPage.totalPages - 1)}"
                                    th:classappend="${i == historyPage.number} ? 'active'">
                                    <a class="page-link"
                                       th:text="${i + 1}"
                                       th:href="@{/borrow-history(
                                            page=${i},
                                            keyword=${keyword},
                                            fromDate=${fromDate},
                                            toDate=${toDate}
                                        )}">
                                    </a>
                                </li>
                                <li class="page-item"
                                    th:classappend="${historyPage.last} ? 'disabled'">
                                    <a class="page-link"
                                       th:href="@{/borrow-history(
                                            page=${historyPage.number + 1},
                                            keyword=${keyword},
                                            fromDate=${fromDate},
                                            toDate=${toDate}
                                        )}" aria-label="Next">
                                        Sau
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 start-0 p-3">
        <div th:if="${success}"
             id="successToast"
             class="toast text-bg-success border-0"
             role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${success}"></span>
                </div>
                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>
            </div>
        </div>
        <div th:if="${error}"
             id="errorToast"
             class="toast text-bg-danger border-0"
             role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${error}"></span>
                </div>
                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const successToast = document.getElementById('successToast');
            if (successToast) {
                new bootstrap.Toast(successToast, {
                    delay: 5000
                }).show();
            }
            const errorToast = document.getElementById('errorToast');
            if (errorToast) {
                new bootstrap.Toast(errorToast, {
                    delay: 5000
                }).show();
            }
        });
    </script>
</div>
</body>
</html>
