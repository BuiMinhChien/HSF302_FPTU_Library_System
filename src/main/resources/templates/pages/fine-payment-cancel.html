<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <meta charset="UTF-8">
    <title>Đã hủy thanh toán</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <i class="bi bi-slash-circle-fill text-warning" style="font-size: 4rem;"></i>
                <h3 class="mt-3">Đã hủy thanh toán</h3>
                <p class="text-muted">
                    Bạn đã hủy giao dịch. Khoản phạt vẫn chưa thanh toán.
                </p>
                <div th:if="${error}" class="alert alert-warning" th:text="${error}"></div>
                <a th:href="@{/reader/fines}" class="btn btn-outline-secondary mt-3">
                    <i class="bi bi-arrow-left me-1"></i> Quay lại danh sách phiếu phạt
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
