<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu</title>
    <!-- App Logo / Favicon -->
    <link rel="icon" type="image/png" th:href="@{/images/app-logo.png}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            background: url('/images/background.jpg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }
        /* Lớp phủ làm tối nền */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            /*background: rgba(0, 0, 0, 0.35);*/
            z-index: -1;
        }
        .card {
            border: none;
            border-radius: 15px;
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.95);
        }

        .fpt-title {
            color: #f37021; /* Cam FPT */
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
        }
    </style>
</head>
<body class="bg-light">

<div class="container">
    <div class="row align-items-center min-vh-100">

        <!-- Cột bên trái -->
        <div class="col-lg-7 d-none d-lg-flex">
            <div class="fpt-title">
                <h1 class="display-2 fw-bold">
                    FPTU Library
                </h1>
                <p class="fs-3" style="font-weight: bold">
                    Hệ thống thư viện trường đại học FPT
                </p>
            </div>
        </div>

        <!-- Cột bên phải -->
        <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4 ms-auto">
            <div class="card shadow">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <img th:src="@{/images/fpt-logo.png}"
                             alt="FPT University Logo"
                             class="img-fluid mb-3"
                             style="max-height: 100px;">

                        <h3 class="card-title">
                            Quên mật khẩu
                        </h3>
                    </div>

                    <form id="loginForm" th:action="@{/forgot-password}" method="post">
                        <!-- Success -->
                        <div th:if="${success}"
                             class="alert alert-success">
                            <i class="bi bi-check-circle-fill me-2"></i>
                            Mật khẩu mới đã được gửi qua email của bạn!
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">
                                Email <span class="text-danger">*</span>
                            </label>
                            <input type="text"
                                   id="email"
                                   name="email"
                                   class="form-control"
                                   placeholder="Nhập email"
                                   autofocus>
                            <div id="emailError"
                                 class="text-danger small mt-1"
                                 style="display:none">
                            </div>
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary">
                                Xác nhận
                            </button>
                        </div>

                        <!-- Error -->
                        <div th:if="${param.error}"
                             class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            Email không chính xác.
                        </div>

                        <div class="text-center">
                            <a th:href="@{/login}">
                                Quay về trang Đăng nhập
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/form-validator.js}"></script>

<script>
    document.getElementById("loginForm")
        .addEventListener("submit", function(e) {
            let valid = true;
            valid = FormValidator.required(
                "email",
                "emailError",
                "Vui lòng nhập email"
            ) && valid;
            if(document.getElementById("email").value.trim()){
                valid = FormValidator.email(
                    "email",
                    "emailError"
                ) && valid;
            }
            if(!valid){
                e.preventDefault();
            }
        });
</script>
</body>
</html>
