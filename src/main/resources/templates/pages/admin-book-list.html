<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sách</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div class="card shadow-sm border-0">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Danh sách các đầu sách</h4>
                <a th:href="@{/admin/books/add}" class="btn btn-primary">
                    <i class="bi bi-plus-circle me-1"></i> Thêm sách mới
                </a>
            </div>

            <div class="card-body">
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                    <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                    <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <form method="get" th:action="@{/admin/books}" class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold small mb-1">Từ khóa tìm kiếm</label>
                        <input type="text" name="keyword" class="form-control"
                               th:value="${keyword}" placeholder="Tên sách, tác giả, NXB, ISBN..." autocomplete="off">
                    </div>
                    <div class="col-md-auto d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary text-nowrap">
                            <i class="bi bi-search me-1"></i> Tìm kiếm
                        </button>
                        <a th:href="@{/admin/books}" class="btn btn-outline-danger" title="Xóa tìm kiếm">
                            <i class="bi bi-x-lg"></i>
                        </a>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th scope="col" style="width: 60px;" class="text-center">Ảnh</th>
                            <th scope="col">ISBN</th>
                            <th scope="col">Tên sách</th>
                            <th scope="col">NXB (Năm)</th>
                            <th scope="col" class="text-center">Số bản</th>
                            <th scope="col" class="text-center" style="width: 150px;">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(bookPage.content)}">
                            <td colspan="6" class="text-center text-muted py-4">Không tìm thấy sách nào</td>
                        </tr>
                        <tr th:each="book : ${bookPage.content}">
                            <td class="text-center">
                                <img th:if="${book.bookCoverUrl != null}" th:src="${book.bookCoverUrl}" style="width: 40px; height: 60px; object-fit: cover;">
                                <i th:if="${book.bookCoverUrl == null}" class="bi bi-book fs-3 text-secondary"></i>
                            </td>
                            <td class="fw-bold" th:text="${book.isbn}">ISBN</td>
                            <td class="fw-bold text-primary" th:text="${book.title}">Tên sách</td>
                            <td th:text="${book.publisher} + ' (' + ${book.publishYear} + ')'">NXB</td>
                            <td class="text-center">
                                <span class="badge bg-success" th:text="${book.availableCopies} + '/' + ${book.totalCopies}"></span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/admin/books/edit/{id}(id=${book.bookId})}" class="btn btn-sm btn-outline-primary me-1" title="Sửa">
                                    <i class="bi bi-pencil-square"></i>
                                </a>
                                <form th:action="@{/admin/books/delete/{id}(id=${book.bookId})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" title="Xóa" onclick="return confirm('Bạn có chắc chắn muốn xóa sách này?')">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <div class="text-muted">
                            Hiển thị
                            <span th:text="${bookPage.number * bookPage.size + (bookPage.totalElements > 0 ? 1 : 0)}"></span>
                            -
                            <span th:text="${bookPage.number * bookPage.size + bookPage.numberOfElements}"></span>
                            trên tổng
                            <span th:text="${bookPage.totalElements}"></span>
                            cuốn sách
                        </div>
                        <nav th:if="${bookPage.totalPages > 1}">
                            <ul class="pagination mb-0">
                                <li class="page-item" th:classappend="${bookPage.first} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/books(page=${bookPage.number - 1}, keyword=${keyword})}">&laquo;</a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, bookPage.totalPages - 1)}" th:classappend="${i == bookPage.number} ? 'active'">
                                    <a class="page-link" th:text="${i + 1}" th:href="@{/admin/books(page=${i}, keyword=${keyword})}"></a>
                                </li>
                                <li class="page-item" th:classappend="${bookPage.last} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/books(page=${bookPage.number + 1}, keyword=${keyword})}">&raquo;</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
