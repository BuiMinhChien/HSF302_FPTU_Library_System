<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <meta charset="UTF-8">
    <title>Đề xuất sách mới</title>
</head>

<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div class="card shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h4 class="mb-0">
                    Danh sách yêu cầu sách mới
                </h4>
                <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createRequestModal">
                    Tạo yêu cầu mới
                </button>
            </div>

            <div class="card-body">
                <form method="get" th:action="@{/new-book-requests}" class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold small mb-1">Từ khóa</label>
                        <input type="text" name="keyword" class="form-control"
                               placeholder="Tên sách hoặc tác giả..." th:value="${keyword}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold small mb-1">Trạng thái</label>
                        <select name="status" class="form-select">
                            <option value="">Tất cả trạng thái</option>
                            <option value="PENDING" th:selected="${status != null and status.name() == 'PENDING'}">Đang chờ duyệt</option>
                            <option value="APPROVED" th:selected="${status != null and status.name() == 'APPROVED'}">Đã được duyệt</option>
                            <option value="REJECTED" th:selected="${status != null and status.name() == 'REJECTED'}">Đã bị từ chối</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold small mb-1">Ngày gửi</label>
                        <input type="date" name="fromDate" class="form-control" th:value="${fromDate}">
                    </div>
                    <div class="col-md-2 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-search me-1"></i> Tìm
                        </button>
                        <a th:href="@{/new-book-requests}" class="btn btn-outline-secondary" title="Đặt lại">
                            <i class="bi bi-arrow-counterclockwise"></i>
                        </a>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>STT</th>
                            <th>Tên sách</th>
                            <th>Tác giả / NXB</th>
                            <th>Ngày gửi</th>
                            <th>Trạng thái</th>
                            <th>Lý do từ chối</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(requests)}">
                            <td colspan="6" class="text-center text-muted">
                                Chưa có yêu cầu nào
                            </td>
                        </tr>
                        <tr th:each="request, stat : ${requests}">
                            <td th:text="${requestPage.number * requestPage.size + stat.count}"></td>

                            <td>
                                <strong th:text="${request.bookTitle}"></strong><br>
                                <a th:if="${request.purchaseLink != null and request.purchaseLink != ''}"
                                   th:href="${request.purchaseLink}" target="_blank" class="small">
                                    Link tham khảo
                                </a>
                            </td>

                            <td>
                                <span th:text="${request.authorName}"></span>
                                <div class="small text-muted" th:text="${request.publisher ?: '-'}"></div>
                            </td>

                            <td>
                                <div th:if="${request.requestDate != null}">
                                    <div class="fw-semibold" th:text="${#temporals.format(request.requestDate, 'dd/MM/yyyy')}"></div>
                                    <small class="text-muted" th:text="${#temporals.format(request.requestDate, 'HH:mm:ss')}"></small>
                                </div>
                                <span th:if="${request.requestDate == null}">-</span>
                            </td>

                            <td>
                                <span class="badge"
                                      th:classappend="
                                          ${request.status.name() == 'PENDING'} ? ' bg-warning text-dark' :
                                          (${request.status.name() == 'APPROVED'} ? ' bg-success' : ' bg-danger')">
                                    <span th:text="${request.status}"></span>
                                </span>
                            </td>

                            <td th:text="${request.rejectionReason ?: '-'}"></td>
                        </tr>
                        </tbody>
                    </table>

                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <div class="text-muted">
                            Hiển thị
                            <span th:text="${requestPage.number * requestPage.size + 1}"></span>
                            -
                            <span th:text="${requestPage.number * requestPage.size + requests.size()}"></span>
                            trên tổng
                            <span th:text="${requestPage.totalElements}"></span>
                            yêu cầu
                        </div>
                        <nav th:if="${requestPage.totalPages > 1}">
                            <ul class="pagination mb-0">
                                <li class="page-item" th:classappend="${requestPage.first} ? 'disabled'">
                                    <a class="page-link" th:href="@{/new-book-requests(page=${requestPage.number - 1}, keyword=${keyword}, status=${status}, fromDate=${fromDate})}" aria-label="Previous">
                                        &laquo;
                                    </a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, requestPage.totalPages - 1)}" th:classappend="${i == requestPage.number} ? 'active'">
                                    <a class="page-link" th:text="${i + 1}" th:href="@{/new-book-requests(page=${i}, keyword=${keyword}, status=${status}, fromDate=${fromDate})}"></a>
                                </li>
                                <li class="page-item" th:classappend="${requestPage.last} ? 'disabled'">
                                    <a class="page-link" th:href="@{/new-book-requests(page=${requestPage.number + 1}, keyword=${keyword}, status=${status}, fromDate=${fromDate})}" aria-label="Next">
                                        &raquo;
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createRequestModal" tabindex="-1" aria-labelledby="createRequestModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-light">
                    <h5 class="modal-title" id="createRequestModalLabel">Đề xuất mua sách mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form method="post" th:action="@{/new-book-requests/create}">
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label fw-bold">Tên sách <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="bookTitle" required placeholder="Nhập tên cuốn sách bạn muốn đề xuất...">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Tác giả <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="authorName" required placeholder="Tên tác giả">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nhà xuất bản</label>
                                <input type="text" class="form-control" name="publisher" placeholder="Tên NXB (nếu biết)">
                            </div>

                            <div class="col-md-12">
                                <label class="form-label fw-bold">Link tham khảo / Mua sách</label>
                                <input type="url" class="form-control" name="purchaseLink" placeholder="Ví dụ: Link Tiki, Shopee, Fahasa...">
                                <small class="text-muted">Giúp thư viện dễ dàng tìm mua đúng cuốn sách bạn cần.</small>
                            </div>

                            <div class="col-md-12">
                                <label class="form-label fw-bold">Lý do đề xuất <span class="text-danger">*</span></label>
                                <textarea class="form-control" name="reason" rows="3" required placeholder="Tại sao thư viện nên mua cuốn sách này? (Phục vụ môn học nào, kỹ năng gì...)"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer bg-light">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-success">Gửi yêu cầu</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 start-0 p-3">
        <div th:if="${success}"
             id="successToast"
             class="toast text-bg-success border-0"
             role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${success}"></span>
                </div>
                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>
            </div>
        </div>
        <div th:if="${error}"
             id="errorToast"
             class="toast text-bg-danger border-0"
             role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${error}"></span>
                </div>
                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const successToast = document.getElementById('successToast');
            if (successToast) {
                new bootstrap.Toast(successToast, {
                    delay: 5000
                }).show();
            }
            const errorToast = document.getElementById('errorToast');
            if (errorToast) {
                new bootstrap.Toast(errorToast, {
                    delay: 5000
                }).show();
            }
        });
    </script>
</div>
</body>
</html>
