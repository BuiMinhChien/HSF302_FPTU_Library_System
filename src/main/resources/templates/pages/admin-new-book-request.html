<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <meta charset="UTF-8">
    <title>Duyệt yêu cầu sách mới (Admin)</title>
</head>

<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div class="card shadow-sm">

            <div class="card-header d-flex justify-content-between align-items-center bg-primary text-white">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-shield-check fs-5"></i>
                    <h4 class="mb-0 text-white">Quản lý Đề xuất sách mới</h4>
                </div>
            </div>

            <div class="card-body">
                <!-- Thông báo thành công/lỗi -->
                <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle-fill me-1"></i> <span th:text="${param.success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i> <span th:text="${param.error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <!-- Form Lọc Trạng Thái -->
                <form method="get" th:action="@{/admin/new-book-requests}" class="row g-3 mb-3">
                    <div class="col-md-3">
                        <select name="status" class="form-select">
                            <option value="">-- Tất cả trạng thái --</option>
                            <option value="PENDING" th:selected="${status != null and status.name() == 'PENDING'}">Đang chờ duyệt</option>
                            <option value="APPROVED" th:selected="${status != null and status.name() == 'APPROVED'}">Đã duyệt</option>
                            <option value="REJECTED" th:selected="${status != null and status.name() == 'REJECTED'}">Đã từ chối</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-outline-primary w-100">
                            <i class="bi bi-funnel me-1"></i> Lọc dữ liệu
                        </button>
                    </div>
                </form>

                <!-- Bảng Danh Sách -->
                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>STT</th>
                            <th>Người gửi</th>
                            <th>Tên sách</th>
                            <th>Lý do mua</th>
                            <th>Ngày gửi</th>
                            <th>Trạng thái</th>
                            <th class="text-center">Hành động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(requests)}">
                            <td colspan="7" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-4 d-block mb-2"></i>
                                Hệ thống chưa có yêu cầu mua sách nào.
                            </td>
                        </tr>
                        <tr th:each="request, stat : ${requests}">
                            <td th:text="${requestPage.number * requestPage.size + stat.count}"></td>
                            
                            <!-- Người gửi -->
                            <td>
                                <strong th:text="${request.user.fullName}"></strong><br>
                                <small class="text-muted" th:text="${request.user.email}"></small>
                            </td>

                            <!-- Thông tin sách -->
                            <td>
                                <strong th:text="${request.bookTitle}"></strong><br>
                                <span class="small text-muted" th:text="${request.authorName}"></span>
                                <a th:if="${request.purchaseLink != null and request.purchaseLink != ''}" 
                                   th:href="${request.purchaseLink}" target="_blank" class="small d-block mt-1">
                                    <i class="bi bi-link-45deg"></i> Link mua
                                </a>
                            </td>
                            
                            <!-- Lý do -->
                            <td th:text="${request.reason}"></td>

                            <!-- Ngày gửi -->
                            <td>
                                <div th:if="${request.requestDate != null}">
                                    <div class="fw-semibold" th:text="${#temporals.format(request.requestDate, 'dd/MM/yyyy')}"></div>
                                    <small class="text-muted" th:text="${#temporals.format(request.requestDate, 'HH:mm')}"></small>
                                </div>
                            </td>
                            
                            <!-- Trạng thái -->
                            <td>
                                <span class="badge"
                                      th:classappend="
                                          ${request.status.name() == 'PENDING'} ? ' bg-warning text-dark' :
                                          (${request.status.name() == 'APPROVED'} ? ' bg-success' : ' bg-danger')">
                                    <i class="bi" th:classappend="
                                          ${request.status.name() == 'PENDING'} ? ' bi-hourglass-split' :
                                          (${request.status.name() == 'APPROVED'} ? ' bi-check-circle' : ' bi-x-circle')"></i>
                                    <span th:text="${request.status}"></span>
                                </span>
                            </td>
                            
                            <!-- Nút Hành động (Chỉ hiện khi PENDING) -->
                            <td class="text-center">
                                <div th:if="${request.status.name() == 'PENDING'}" class="d-flex justify-content-center gap-2">
                                    <!-- Nút Duyệt -->
                                    <form method="post" th:action="@{/admin/new-book-requests/approve}">
                                        <input type="hidden" name="requestId" th:value="${request.newBookRequestId}">
                                        <button type="submit" class="btn btn-sm btn-success" title="Duyệt yêu cầu"
                                                onclick="return confirm('Xác nhận DUYỆT yêu cầu mua sách này?');">
                                            <i class="bi bi-check-lg"></i> Duyệt
                                        </button>
                                    </form>
                                    
                                    <!-- Nút Từ chối -->
                                    <form method="post" th:action="@{/admin/new-book-requests/reject}">
                                        <input type="hidden" name="requestId" th:value="${request.newBookRequestId}">
                                        <button type="submit" class="btn btn-sm btn-danger" title="Từ chối yêu cầu"
                                                onclick="return confirm('Xác nhận TỪ CHỐI yêu cầu mua sách này?');">
                                            <i class="bi bi-x-lg"></i> Từ chối
                                        </button>
                                    </form>
                                </div>
                                <span th:if="${request.status.name() != 'PENDING'}" class="text-muted small">
                                    Đã xử lý bởi <br> <strong th:text="${request.approvedBy?.fullName ?: 'Admin'}"></strong>
                                </span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Phân trang -->
                <div class="d-flex justify-content-between align-items-center mt-3" th:if="${requestPage.totalElements > 0}">
                    <div class="text-muted small">
                        Hiển thị
                        <span th:text="${requestPage.number * requestPage.size + 1}"></span>
                        -
                        <span th:text="${requestPage.number * requestPage.size + requests.size()}"></span>
                        / <span th:text="${requestPage.totalElements}"></span> yêu cầu
                    </div>
                    <nav th:if="${requestPage.totalPages > 1}">
                        <ul class="pagination mb-0">
                            <li class="page-item" th:classappend="${requestPage.first} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/new-book-requests(page=${requestPage.number - 1}, status=${status})}">Trước</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, requestPage.totalPages - 1)}" th:classappend="${i == requestPage.number} ? 'active'">
                                <a class="page-link" th:text="${i + 1}" th:href="@{/admin/new-book-requests(page=${i}, status=${status})}"></a>
                            </li>
                            <li class="page-item" th:classappend="${requestPage.last} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/new-book-requests(page=${requestPage.number + 1}, status=${status})}">Sau</a>
                            </li>
                        </ul>
                    </nav>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
