<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main-layout}">
<head>
    <meta charset="UTF-8">
    <title th:text="${book.title}">Chi tiết sách</title>
</head>

<body>
<div layout:fragment="content">
    <div class="container-fluid py-4">

        <!-- Header -->
        <div class="mb-4">
            <h2 class="fw-bold" th:text="${book.title}"></h2>
            <div class="text-muted">
                ISBN:
                <span th:text="${book.isbn}"></span>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <!-- BOOK INFO (Full width col-12) -->
            <div class="col-12">
                <div class="card shadow-sm h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">
                            <i class="bi bi-book"></i>
                            Thông tin sách
                        </h5>
                        <!-- Nút mượn sách cho READER trên header card (Tùy chọn hiển thị) -->
                        <div sec:authorize="hasRole('READER')">
                            <button class="btn btn-primary"
                                    data-bs-toggle="modal"
                                    data-bs-target="#borrowModal">
                                <i class="bi bi-journal-check me-1"></i>
                                Đăng ký mượn sách
                            </button>
                        </div>
                    </div>
                    <div class="card-body">

                        <!-- Row 1: Ảnh bìa & Thông tin chi tiết -->
                        <div class="row g-4">
                            <!-- Book Cover -->
                            <div class="col-md-3 text-center">
                                <img th:src="${book.bookCoverUrl}"
                                     alt="Book Cover"
                                     class="img-fluid rounded shadow-sm w-100"
                                     style="max-height:360px; object-fit:cover;">
                            </div>

                            <!-- Book Summary Table -->
                            <div class="col-md-9">
                                <table class="table table-borderless mb-0 align-middle">
                                    <tbody>
                                    <tr>
                                        <th width="20%">Tiêu đề</th>
                                        <td th:text="${book.title}"></td>
                                    </tr>

                                    <tr>
                                        <th>ISBN</th>
                                        <td th:text="${book.isbn}"></td>
                                    </tr>

                                    <tr>
                                        <th>Thể loại</th>
                                        <td>
                                            <span th:each="category : ${book.categories}"
                                                  class="badge bg-primary me-1"
                                                  th:text="${category}">
                                            </span>
                                        </td>
                                    </tr>

                                    <tr>
                                        <th>NXB</th>
                                        <td th:text="${book.publisher}"></td>
                                    </tr>

                                    <tr>
                                        <th>Năm XB</th>
                                        <td th:text="${book.publishYear}"></td>
                                    </tr>

                                    <!-- Thêm dòng: Tổng số bản -->
                                    <tr>
                                        <th>Tổng số bản</th>
                                        <td th:text="${book.totalCopies}">15</td>
                                    </tr>

                                    <!-- Thêm dòng: Sẵn sàng mượn (Màu xanh lá) -->
                                    <tr>
                                        <th>Sẵn sàng mượn</th>
                                        <td>
                                            <span class="text-success fw-bold fs-6"
                                                  th:text="${book.availableCopies}">10</span>
                                            <small class="text-muted ms-1">(bản)</small>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Row 2: Mô tả sách -->
                        <hr class="my-4">

                        <div class="row">
                            <div class="col-12">
                                <h6 class="fw-bold">
                                    <i class="bi bi-card-text me-1"></i>
                                    Mô tả sách
                                </h6>

                                <p class="text-muted mb-0"
                                   style="text-align: justify;"
                                   th:text="${book.description}">
                                </p>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- AUTHORS -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="bi bi-people me-1"></i>
                            Tác giả
                        </h5>
                    </div>

                    <div class="card-body">
                        <div th:each="author, stat : ${book.authors}" class="row align-items-start">
                            <!-- Avatar -->
                            <div class="col-md-2 col-sm-3 text-center mb-3 mb-md-0">
                                <img th:src="${author.avatarUrl}"
                                     alt="Author Avatar"
                                     class="rounded-circle shadow-sm"
                                     style="width:110px;height:110px;object-fit:cover;">
                            </div>
                            <!-- Info -->
                            <div class="col-md-10 col-sm-9">
                                <h4 class="fw-bold mb-2" th:text="${author.authorName}"></h4>
                                <p class="text-muted mb-0"
                                   style="text-align: justify;"
                                   th:text="${author.biography}">
                                </p>
                            </div>
                            <div class="col-12" th:if="${!stat.last}">
                                <hr class="my-4">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Borrow Confirmation Modal -->
    <div class="modal fade"
         id="borrowModal"
         tabindex="-1"
         aria-labelledby="borrowModalLabel"
         aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"
                        id="borrowModalLabel">
                        Xác nhận đăng ký mượn sách
                    </h5>
                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                            aria-label="Close">
                    </button>
                </div>
                <div class="modal-body">
                    <p class="mb-0">
                        Bạn có chắc chắn muốn đặt mượn cuốn sách
                        <strong th:text="${book.title}"></strong>
                        không?
                    </p>
                    <div class="form-text">
                        Nếu yêu cầu mượn sách được phê duyệt, bạn có thể đến thư viện lấy sách trong 7 ngày
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">
                        Hủy
                    </button>
                    <form th:action="@{/borrow-requests/create}"
                          method="post">
                        <input type="hidden"
                               name="bookId"
                               th:value="${book.bookId}">
                        <button type="submit"
                                class="btn btn-primary">
                            Xác nhận
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 start-0 p-3">
        <!-- Success Toast -->
        <div th:if="${success}"
             id="successToast"
             class="toast text-bg-success border-0"
             role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${success}"></span>
                </div>
                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>
            </div>
        </div>
        <!-- Error Toast -->
        <div th:if="${error}"
             id="errorToast"
             class="toast text-bg-danger border-0"
             role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${error}"></span>
                </div>
                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const successToast = document.getElementById('successToast');
            if (successToast) {
                new bootstrap.Toast(successToast, {
                    delay: 5000
                }).show();
            }
            const errorToast = document.getElementById('errorToast');
            if (errorToast) {
                new bootstrap.Toast(errorToast, {
                    delay: 5000
                }).show();
            }
        });
    </script>
</div>
</body>
</html>
