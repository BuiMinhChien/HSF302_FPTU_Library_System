<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Tài khoản (Admin)</title>
</head>

<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div class="card shadow-sm border-0">

            <div class="card-header d-flex justify-content-between align-items-center">
                <h4 class="mb-0">
                    Danh sách tài khoản hệ thống
                </h4>
                <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addAccountModal">
                    <i class="bi bi-plus-circle me-1"></i> Thêm tài khoản
                </button>
            </div>

            <div class="card-body">
                <form method="get" th:action="@{/admin/accounts}" class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold small mb-1">Từ khóa</label>
                        <input type="text" name="keyword" class="form-control"
                               th:value="${keyword}" placeholder="Tên, email hoặc mã số...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold small mb-1">Vai trò</label>
                        <select name="role" class="form-select">
                            <option value="">Tất cả vai trò</option>
                            <option value="ADMIN" th:selected="${role != null and role.name() == 'ADMIN'}">Quản trị viên (Admin)</option>
                            <option value="LIBRARIAN" th:selected="${role != null and role.name() == 'LIBRARIAN'}">Thủ thư (Librarian)</option>
                            <option value="READER" th:selected="${role != null and role.name() == 'READER'}">Độc giả (Sinh viên/GV)</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold small mb-1">Trạng thái</label>
                        <select name="status" class="form-select">
                            <option value="">Tất cả trạng thái</option>
                            <option value="true" th:selected="${status != null and status == true}">Hoạt động</option>
                            <option value="false" th:selected="${status != null and status == false}">Bị khóa</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-search me-1"></i> Tìm
                        </button>
                        <a th:href="@{/admin/accounts}" class="btn btn-outline-secondary" title="Đặt lại">
                            <i class="bi bi-arrow-counterclockwise"></i>
                        </a>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>STT</th>
                            <th>Họ & Tên</th>
                            <th>Mã số</th>
                            <th>Liên hệ</th>
                            <th>Địa chỉ</th>
                            <th>Vai trò</th>
                            <th>Trạng thái</th>
                            <th>Tùy chọn</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(accounts)}">
                            <td colspan="8" class="text-center text-muted">
                                Chưa có tài khoản nào
                            </td>
                        </tr>
                        <tr th:each="acc, stat : ${accounts}">
                            <td th:text="${accountPage.number * accountPage.size + stat.count}"></td>
                            <td>
                                <strong th:text="${acc.fullName}"></strong>
                            </td>
                            <td>
                                <span class="badge bg-light text-dark border" th:text="${acc.code}"></span>
                            </td>
                            <td>
                                <div th:text="${acc.email}"></div>
                                <small class="text-muted" th:if="${acc.phone != null}" th:text="${acc.phone}"></small>
                            </td>
                            <td th:text="${acc.address ?: '-'}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="
                                            ${acc.role.name() == 'ADMIN'} ? ' bg-danger' :
                                            (${acc.role.name() == 'LIBRARIAN'} ? ' bg-info text-dark' : ' bg-primary')">
                                    <span th:text="${acc.role}"></span>
                                </span>
                            </td>
                            <td>
                                <span class="badge" th:classappend="${acc.status} ? ' bg-success' : ' bg-secondary'">
                                    <span th:text="${acc.status ? 'Hoạt động' : 'Bị khóa'}"></span>
                                </span>
                            </td>
                            <!-- Thao tác Khóa/Mở khóa và Sửa -->
                            <td class="text-center">
                                <div class="d-flex gap-2 justify-content-center">
                                    <button type="button" class="btn btn-sm btn-outline-primary"
                                            data-bs-toggle="modal"
                                            th:data-bs-target="'#editAccountModal-' + ${acc.userId}" title="Sửa thông tin">
                                        <i class="bi bi-pencil-square"></i>
                                    </button>
                                    
                                    <form method="post" th:action="@{/admin/accounts/toggle-status}">
                                        <input type="hidden" name="userId" th:value="${acc.userId}">
                                        
                                        <button th:if="${acc.status}" type="submit" class="btn btn-sm btn-outline-danger" 
                                                title="Khóa tài khoản này"
                                                onclick="return confirm('Bạn có chắc chắn muốn KHÓA tài khoản này không? Người này sẽ không thể đăng nhập nữa.');">
                                            <i class="bi bi-lock-fill"></i> Khóa
                                        </button>
                                        
                                         <button th:unless="${acc.status}" type="submit" class="btn btn-sm btn-outline-success" 
                                                title="Mở khóa tài khoản"
                                                onclick="return confirm('Xác nhận MỞ KHÓA cho tài khoản này?');">
                                            <i class="bi bi-unlock-fill"></i> Mở
                                        </button>
                                    </form>
                                </div>

                                <!-- Modal Sửa Tài Khoản -->
                                <div class="modal fade text-start" th:id="'editAccountModal-' + ${acc.userId}" tabindex="-1" aria-hidden="true">
                                    <div class="modal-dialog modal-lg">
                                        <div class="modal-content">
                                            <form th:action="@{/admin/accounts/edit/{id}(id=${acc.userId})}" method="post">
                                                <div class="modal-header bg-light">
                                                    <h5 class="modal-title fw-bold text-primary"><i class="bi bi-pencil-square me-2"></i>Sửa thông tin tài khoản</h5>
                                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                                </div>
                                                <div class="modal-body">
                                                    <div class="row g-3">
                                                        <div class="col-md-6">
                                                            <label class="form-label fw-bold">Họ và Tên <span class="text-danger">*</span></label>
                                                            <input type="text" class="form-control" name="fullName" th:value="${acc.fullName}" required>
                                                        </div>
                                                        <div class="col-md-6">
                                                            <label class="form-label fw-bold">Mã số <span class="text-danger">*</span></label>
                                                            <input type="text" class="form-control" name="code" th:value="${acc.code}" required>
                                                        </div>
                                                        <div class="col-md-6">
                                                            <label class="form-label fw-bold">Email <span class="text-danger">*</span></label>
                                                            <input type="email" class="form-control" name="email" th:value="${acc.email}" required>
                                                        </div>
                                                        <div class="col-md-6">
                                                            <label class="form-label fw-bold">Số điện thoại</label>
                                                            <input type="text" class="form-control" name="phone" th:value="${acc.phone}">
                                                        </div>
                                                        <div class="col-md-6">
                                                            <label class="form-label fw-bold">Vai trò <span class="text-danger">*</span></label>
                                                            <select name="role" class="form-select" required>
                                                                <option value="ADMIN" th:selected="${acc.role.name() == 'ADMIN'}">Quản trị viên (Admin)</option>
                                                                <option value="LIBRARIAN" th:selected="${acc.role.name() == 'LIBRARIAN'}">Thủ thư (Librarian)</option>
                                                                <option value="READER" th:selected="${acc.role.name() == 'READER'}">Độc giả (Reader)</option>
                                                            </select>
                                                        </div>
                                                        <div class="col-md-6">
                                                            <label class="form-label fw-bold">Mật khẩu mới (Bỏ trống nếu không đổi)</label>
                                                            <input type="password" class="form-control" name="password" placeholder="Nhập mật khẩu mới...">
                                                        </div>
                                                        <div class="col-12">
                                                            <label class="form-label fw-bold">Địa chỉ</label>
                                                            <input type="text" class="form-control" name="address" th:value="${acc.address}">
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                                                    <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <div class="text-muted">
                            Hiển thị
                            <span th:text="${accountPage.number * accountPage.size + 1}"></span>
                            -
                            <span th:text="${accountPage.number * accountPage.size + accounts.size()}"></span>
                            trên tổng
                            <span th:text="${accountPage.totalElements}"></span>
                            tài khoản
                        </div>
                        <nav th:if="${accountPage.totalPages > 1}">
                            <ul class="pagination mb-0">
                                <li class="page-item" th:classappend="${accountPage.first} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/accounts(page=${accountPage.number - 1}, keyword=${keyword}, role=${role}, status=${status})}" aria-label="Previous">
                                        &laquo;
                                    </a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, accountPage.totalPages - 1)}" th:classappend="${i == accountPage.number} ? 'active'">
                                    <a class="page-link" th:text="${i + 1}" th:href="@{/admin/accounts(page=${i}, keyword=${keyword}, role=${role}, status=${status})}"></a>
                                </li>
                                <li class="page-item" th:classappend="${accountPage.last} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/accounts(page=${accountPage.number + 1}, keyword=${keyword}, role=${role}, status=${status})}" aria-label="Next">
                                        &raquo;
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Modal Thêm Tài Khoản Mới -->
    <div class="modal fade" id="addAccountModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form th:action="@{/admin/accounts/add}" method="post">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title fw-bold"><i class="bi bi-person-plus-fill me-2"></i>Thêm tài khoản mới</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Họ và Tên <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="fullName" required placeholder="Nhập họ và tên...">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Mã số <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="code" required placeholder="Ví dụ: HE123456, LIB001...">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Email <span class="text-danger">*</span></label>
                                <input type="email" class="form-control" name="email" required placeholder="Nhập địa chỉ email...">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Số điện thoại</label>
                                <input type="text" class="form-control" name="phone" placeholder="Nhập số điện thoại...">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Vai trò <span class="text-danger">*</span></label>
                                <select name="role" class="form-select" required>
                                    <option value="READER" selected>Độc giả (Reader)</option>
                                    <option value="LIBRARIAN">Thủ thư (Librarian)</option>
                                    <option value="ADMIN">Quản trị viên (Admin)</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Mật khẩu <span class="text-danger">*</span></label>
                                <input type="password" class="form-control" name="password" required placeholder="Nhập mật khẩu đăng nhập...">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold">Địa chỉ</label>
                                <input type="text" class="form-control" name="address" placeholder="Nhập địa chỉ...">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-primary">Thêm tài khoản</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 start-0 p-3">
        <div th:if="${success}"
             id="successToast"
             class="toast text-bg-success border-0"
             role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${success}"></span>
                </div>
                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>
            </div>
        </div>
        <div th:if="${error}"
             id="errorToast"
             class="toast text-bg-danger border-0"
             role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${error}"></span>
                </div>
                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const successToast = document.getElementById('successToast');
            if (successToast) {
                new bootstrap.Toast(successToast, {
                    delay: 5000
                }).show();
            }
            const errorToast = document.getElementById('errorToast');
            if (errorToast) {
                new bootstrap.Toast(errorToast, {
                    delay: 5000
                }).show();
            }
        });
    </script>
</div>
</body>
</html>
