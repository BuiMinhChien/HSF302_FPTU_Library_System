<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Tài khoản (Admin)</title>
</head>

<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div class="card shadow-sm">
            <div class="card-header">
                <h4 class="mb-0">
                    Quản lý Tài khoản Hệ thống
                </h4>
            </div>

            <div class="card-body">
                <form method="get" th:action="@{/admin/accounts}" class="row g-3 mb-3">
                    <div class="col-md-5">
                        <input type="text" name="keyword" class="form-control"
                               th:value="${keyword}" placeholder="Nhập tên, email hoặc mã số...">
                    </div>
                    <div class="col-md-3">
                        <select name="role" class="form-select">
                            <option value="">Tất cả vai trò</option>
                            <option value="ADMIN" th:selected="${role != null and role.name() == 'ADMIN'}">Quản trị viên (Admin)</option>
                            <option value="LIBRARIAN" th:selected="${role != null and role.name() == 'LIBRARIAN'}">Thủ thư (Librarian)</option>
                            <option value="READER" th:selected="${role != null and role.name() == 'READER'}">Độc giả (Sinh viên/GV)</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">
                            Tìm kiếm
                        </button>
                    </div>
                    <div class="col-md-2">
                        <a th:href="@{/admin/accounts}" class="btn btn-outline-secondary w-100">
                            <i class="bi bi-arrow-counterclockwise me-1"></i> Đặt lại
                        </a>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>STT</th>
                            <th>Họ & Tên</th>
                            <th>Mã số</th>
                            <th>Liên hệ</th>
                            <th>Địa chỉ</th>
                            <th>Vai trò</th>
                            <th>Trạng thái</th>
                            <th>Tùy chọn</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(accounts)}">
                            <td colspan="8" class="text-center text-muted">
                                Chưa có tài khoản nào
                            </td>
                        </tr>
                        <tr th:each="acc, stat : ${accounts}">
                            <td th:text="${accountPage.number * accountPage.size + stat.count}"></td>
                            <td>
                                <strong th:text="${acc.fullName}"></strong>
                            </td>
                            <td>
                                <span class="badge bg-light text-dark border" th:text="${acc.code}"></span>
                            </td>
                            <td>
                                <div th:text="${acc.email}"></div>
                                <small class="text-muted" th:if="${acc.phone != null}" th:text="${acc.phone}"></small>
                            </td>
                            <td th:text="${acc.address ?: '-'}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="
                                            ${acc.role.name() == 'ADMIN'} ? ' bg-danger' :
                                            (${acc.role.name() == 'LIBRARIAN'} ? ' bg-info text-dark' : ' bg-primary')">
                                    <span th:text="${acc.role}"></span>
                                </span>
                            </td>
                            <td>
                                <span class="badge" th:classappend="${acc.status} ? ' bg-success' : ' bg-secondary'">
                                    <span th:text="${acc.status ? 'Hoạt động' : 'Bị khóa'}"></span>
                                </span>
                            </td>
                            <td>
                                <div class="d-flex gap-2">
                                    <form method="post" th:action="@{/admin/accounts/toggle-status}">
                                        <input type="hidden" name="userId" th:value="${acc.userId}">
                                        <button th:if="${acc.status}" type="submit" class="btn btn-sm btn-outline-danger"
                                                onclick="return confirm('Bạn có chắc chắn muốn khóa tài khoản này không?');">
                                            Khóa
                                        </button>
                                        <button th:unless="${acc.status}" type="submit" class="btn btn-sm btn-outline-success"
                                                onclick="return confirm('Xác nhận mở khóa cho tài khoản này?');">
                                            Mở khóa
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <div class="text-muted">
                            Hiển thị
                            <span th:text="${accountPage.number * accountPage.size + 1}"></span>
                            -
                            <span th:text="${accountPage.number * accountPage.size + accounts.size()}"></span>
                            trên tổng
                            <span th:text="${accountPage.totalElements}"></span>
                            tài khoản
                        </div>
                        <nav th:if="${accountPage.totalPages > 1}">
                            <ul class="pagination mb-0">
                                <li class="page-item" th:classappend="${accountPage.first} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/accounts(page=${accountPage.number - 1}, keyword=${keyword}, role=${role})}">
                                        Trước
                                    </a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, accountPage.totalPages - 1)}" th:classappend="${i == accountPage.number} ? 'active'">
                                    <a class="page-link" th:text="${i + 1}" th:href="@{/admin/accounts(page=${i}, keyword=${keyword}, role=${role})}"></a>
                                </li>
                                <li class="page-item" th:classappend="${accountPage.last} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/accounts(page=${accountPage.number + 1}, keyword=${keyword}, role=${role})}">
                                        Sau
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 start-0 p-3">
        <div th:if="${success}"
             id="successToast"
             class="toast text-bg-success border-0"
             role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${success}"></span>
                </div>
                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>
            </div>
        </div>
        <div th:if="${error}"
             id="errorToast"
             class="toast text-bg-danger border-0"
             role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${error}"></span>
                </div>
                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const successToast = document.getElementById('successToast');
            if (successToast) {
                new bootstrap.Toast(successToast, {
                    delay: 5000
                }).show();
            }
            const errorToast = document.getElementById('errorToast');
            if (errorToast) {
                new bootstrap.Toast(errorToast, {
                    delay: 5000
                }).show();
            }
        });
    </script>
</div>
</body>
</html>
