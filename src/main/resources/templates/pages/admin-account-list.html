<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Tài khoản (Admin)</title>
</head>

<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div class="card shadow-sm">

            <div class="card-header d-flex justify-content-between align-items-center">
                <h4 class="mb-0">
                    Danh sách tài khoản hệ thống
                </h4>
                <a th:href="@{/admin/accounts/add}" class="btn btn-primary">
                    Thêm tài khoản
                </a>
            </div>

            <div class="card-body">
                <form method="get" th:action="@{/admin/accounts}" class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold small mb-1">Từ khóa</label>
                        <input type="text" name="keyword" class="form-control"
                               th:value="${keyword}" placeholder="Tên, email hoặc mã số...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold small mb-1">Vai trò</label>
                        <select name="role" class="form-select">
                            <option value="">Tất cả vai trò</option>
                            <option value="ADMIN" th:selected="${role != null and role.name() == 'ADMIN'}">Quản trị viên (Admin)</option>
                            <option value="LIBRARIAN" th:selected="${role != null and role.name() == 'LIBRARIAN'}">Thủ thư (Librarian)</option>
                            <option value="READER" th:selected="${role != null and role.name() == 'READER'}">Độc giả (Sinh viên/GV)</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold small mb-1">Trạng thái</label>
                        <select name="status" class="form-select">
                            <option value="">Tất cả trạng thái</option>
                            <option value="true" th:selected="${status != null and status == true}">Hoạt động</option>
                            <option value="false" th:selected="${status != null and status == false}">Bị khóa</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-search me-1"></i> Tìm kiếm
                        </button>
                        <a th:href="@{/admin/accounts}" class="btn btn-outline-secondary" title="Đặt lại">
                            <i class="bi bi-arrow-counterclockwise"></i>
                        </a>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>STT</th>
                            <th class="text-center" style="width: 80px;">Ảnh</th> <!-- Cột hiển thị avatar -->
                            <th>Họ & Tên</th>
                            <th>Mã số</th>
                            <th>Liên hệ</th>
                            <th>Địa chỉ</th>
                            <th>Vai trò</th>
                            <th>Trạng thái</th>
                            <th>Tùy chọn</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(accounts)}">
                            <td colspan="9" class="text-center text-muted"> <!-- Tăng colspan lên 9 -->
                                Chưa có tài khoản nào
                            </td>
                        </tr>
                        <tr th:each="acc, stat : ${accounts}">
                            <td th:text="${accountPage.number * accountPage.size + stat.count}"></td>

                            <!-- Cột hiển thị Avatar được thêm mới -->
                            <td class="text-center">
                                <img th:if="${acc.avatarUrl != null and !#strings.isEmpty(acc.avatarUrl)}"
                                     th:src="${acc.avatarUrl}"
                                     alt="Avatar"
                                     class="rounded-circle object-fit-cover border shadow-sm"
                                     style="width: 40px; height: 40px;">
                                <!-- Hiển thị avatar mặc định bằng icon nếu avatarUrl rỗng -->
                                <i th:unless="${acc.avatarUrl != null and !#strings.isEmpty(acc.avatarUrl)}"
                                   class="bi bi-person-circle fs-3 text-secondary"></i>
                            </td>

                            <td>
                                <strong th:text="${acc.fullName}"></strong>
                            </td>
                            <td>
                                <span class="badge bg-light text-dark border" th:text="${acc.code}"></span>
                            </td>
                            <td>
                                <div th:text="${acc.email}"></div>
                                <small class="text-muted" th:if="${acc.phone != null}" th:text="${acc.phone}"></small>
                            </td>
                            <td th:text="${acc.address ?: '-'}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="
                                            ${acc.role.name() == 'ADMIN'} ? ' bg-danger' :
                                            (${acc.role.name() == 'LIBRARIAN'} ? ' bg-info text-dark' : ' bg-primary')">
                                    <span th:text="${acc.role}"></span>
                                </span>
                            </td>
                            <td>
                                <!-- Sử dụng acc.status kiểu boolean nguyên thủy từ UserProfileDto -->
                                <span class="badge" th:classappend="${acc.status} ? ' bg-success' : ' bg-secondary'">
                                    <span th:text="${acc.status ? 'Hoạt động' : 'Bị khóa'}"></span>
                                </span>
                            </td>
                            <!-- Thao tác Khóa/Mở khóa và Sửa dựa theo code và các trường có sẵn -->
                            <td class="text-center">
                                <div class="d-flex gap-2 justify-content-center">
                                    <a th:href="@{/admin/accounts/edit/{userId}(userId=${acc.userId})}"
                                       class="btn btn-sm btn-outline-primary"
                                       title="Sửa thông tin">
                                        <i class="bi bi-pencil-square"></i>
                                    </a>

                                    <form th:id="'toggleForm-' + ${acc.userId}" method="post" th:action="@{/admin/accounts/toggle-status}">
                                        <input type="hidden" name="userId" th:value="${acc.userId}">
                                        <button th:if="${acc.status}" type="button" class="btn btn-sm btn-outline-danger btn-toggle-status"
                                                title="Khóa tài khoản này"
                                                th:data-form-id="'toggleForm-' + ${acc.userId}"
                                                th:data-action-type="lock"
                                                th:data-user-name="${acc.fullName}">
                                            <i class="bi bi-lock-fill"></i> Khóa
                                        </button>
                                        <button th:unless="${acc.status}" type="button" class="btn btn-sm btn-outline-success btn-toggle-status"
                                                title="Mở khóa tài khoản"
                                                th:data-form-id="'toggleForm-' + ${acc.userId}"
                                                th:data-action-type="unlock"
                                                th:data-user-name="${acc.fullName}">
                                            <i class="bi bi-unlock-fill"></i> Mở
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <div class="text-muted">
                            Hiển thị
                            <span th:text="${accountPage.number * accountPage.size + 1}"></span>
                            -
                            <span th:text="${accountPage.number * accountPage.size + accounts.size()}"></span>
                            trên tổng
                            <span th:text="${accountPage.totalElements}"></span>
                            dòng
                        </div>
                        <nav th:if="${accountPage.totalPages > 1}">
                            <ul class="pagination mb-0">
                                <li class="page-item" th:classappend="${accountPage.first} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/accounts(page=${accountPage.number - 1}, keyword=${keyword}, role=${role}, status=${status})}" aria-label="Previous">
                                        Trước
                                    </a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, accountPage.totalPages - 1)}" th:classappend="${i == accountPage.number} ? 'active'">
                                    <a class="page-link" th:text="${i + 1}" th:href="@{/admin/accounts(page=${i}, keyword=${keyword}, role=${role}, status=${status})}"></a>
                                </li>
                                <li class="page-item" th:classappend="${accountPage.last} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/accounts(page=${accountPage.number + 1}, keyword=${keyword}, role=${role}, status=${status})}" aria-label="Next">
                                        Sau
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Confirm Modal Dùng Chung Cho Việc Khóa/Mở -->
    <div class="modal fade" id="confirmToggleStatusModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" id="toggleModalHeader">
                    <h5 class="modal-title text-white" id="toggleModalTitle">Xác nhận thao tác</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="toggleModalBody">
                    Nội dung thông báo xác nhận sẽ hiển thị ở đây...
                </div>
                <div class="modal-footer p-3 d-flex justify-content-end gap-2 border-top">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy bỏ</button>
                    <button type="button" id="btnToggleModalSubmit" class="btn">Xác nhận</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 start-0 p-3">
        <div th:if="${success}" id="successToast" class="toast text-bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${success}"></span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
        <div th:if="${error}" id="errorToast" class="toast text-bg-danger border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${error}"></span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const successToast = document.getElementById('successToast');
            if (successToast) {
                new bootstrap.Toast(successToast, { delay: 5000 }).show();
            }
            const errorToast = document.getElementById('errorToast');
            if (errorToast) {
                new bootstrap.Toast(errorToast, { delay: 5000 }).show();
            }

            let targetFormId = null;
            const toggleModal = new bootstrap.Modal(document.getElementById('confirmToggleStatusModal'));
            const toggleModalHeader = document.getElementById('toggleModalHeader');
            const toggleModalTitle = document.getElementById('toggleModalTitle');
            const toggleModalBody = document.getElementById('toggleModalBody');
            const btnToggleModalSubmit = document.getElementById('btnToggleModalSubmit');

            document.querySelectorAll('.btn-toggle-status').forEach(button => {
                button.addEventListener('click', function () {
                    targetFormId = this.getAttribute('data-form-id');
                    const actionType = this.getAttribute('data-action-type');
                    const userName = this.getAttribute('data-user-name');
                    if (actionType === 'lock') {
                        toggleModalHeader.className = "modal-header bg-danger text-white";
                        toggleModalTitle.innerHTML = '<i class="bi bi-lock-fill me-2"></i>Khóa tài khoản';
                        toggleModalBody.innerHTML = `Bạn có chắc chắn muốn <strong>KHÓA</strong> tài khoản của <strong>${userName}</strong> không?<br><small class="text-danger">* Người này sẽ không thể đăng nhập vào hệ thống nữa.</small>`;
                        btnToggleModalSubmit.className = "btn btn-danger";
                        btnToggleModalSubmit.textContent = "Khóa tài khoản";
                    } else {
                        toggleModalHeader.className = "modal-header bg-success text-white";
                        toggleModalTitle.innerHTML = '<i class="bi bi-unlock-fill me-2"></i>Mở khóa tài khoản';
                        toggleModalBody.innerHTML = `Xác nhận <strong>MỞ KHÓA</strong> cho tài khoản của <strong>${userName}</strong>?`;
                        btnToggleModalSubmit.className = "btn btn-success";
                        btnToggleModalSubmit.textContent = "Mở khóa";
                    }
                    toggleModal.show();
                });
            });

            btnToggleModalSubmit.addEventListener('click', function () {
                if (targetFormId) {
                    document.getElementById(targetFormId).submit();
                }
            });
        });
    </script>
</div>
</body>
</html>
