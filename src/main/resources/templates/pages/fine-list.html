<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <meta charset="UTF-8">
    <title>Phiếu phạt của tôi</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div class="card shadow-sm">
            <div class="card-header d-flex align-items-center gap-2">
                <i class="bi bi-cash-coin fs-5 text-danger"></i>
                <h4 class="mb-0">Phiếu phạt của tôi</h4>
            </div>
            <div class="card-body">
                <div th:if="${success}" class="alert alert-success">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${success}"></span>
                </div>
                <div th:if="${error}" class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${error}"></span>
                </div>

                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>STT</th>
                            <th>Sách</th>
                            <th>Lý do</th>
                            <th>Số tiền</th>
                            <th>Ngày tạo</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(fines)}">
                            <td colspan="7" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-4 d-block mb-2"></i>
                                Bạn chưa có khoản phạt nào.
                            </td>
                        </tr>
                        <tr th:each="fine, stat : ${fines}">
                            <td th:text="${stat.count}">1</td>
                            <td th:text="${fine.bookTitle}">Sách</td>
                            <td th:text="${fine.reason}">Lý do</td>
                            <td th:text="${#numbers.formatDecimal(fine.amount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
                            <td th:text="${fine.createdAt != null ? #temporals.format(fine.createdAt, 'dd/MM/yyyy HH:mm') : '-'}">-</td>
                            <td>
                                <span th:if="${fine.status.name() == 'UNPAID'}"
                                      class="badge bg-warning text-dark">Chưa thanh toán</span>
                                <span th:if="${fine.status.name() == 'PAID'}"
                                      class="badge bg-success">Đã thanh toán</span>
                            </td>
                            <td>
                                <a th:if="${fine.canPay}"
                                   th:href="@{/reader/fines/{id}/pay(id=${fine.fineId})}"
                                   class="btn btn-sm btn-primary">
                                    <i class="bi bi-credit-card me-1"></i> Pay
                                </a>
                                <span th:if="${!fine.canPay}" class="text-success">
                                    <i class="bi bi-check-circle me-1"></i> Đã thanh toán
                                </span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
