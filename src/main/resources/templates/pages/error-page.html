<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trang Lỗi</title>
    <!-- App Logo / Favicon -->
    <link rel="icon" type="image/png" th:href="@{/images/app-logo.png}">
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-danger">
                <div class="card-header bg-danger text-white">
                    <h3 class="mb-0">
                        Đã có lỗi xảy ra
                    </h3>
                </div>
                <div class="card-body">
                    <div class="alert alert-danger">
                        <h4 class="alert-heading"
                            th:text="${status} + ' - ' + ${error}">
                            500 - INTERNAL_SERVER_ERROR
                        </h4>
                        <p class="mb-0"
                           th:text="${message}">
                            Something went wrong
                        </p>
                    </div>
                    <table class="table table-bordered">
                        <tbody>
                        <tr>
                            <th width="25%">Status</th>
                            <td th:text="${status}">500</td>
                        </tr>
                        <tr>
                            <th>Error</th>
                            <td th:text="${error}">
                                INTERNAL_SERVER_ERROR
                            </td>
                        </tr>
                        <tr>
                            <th>Message</th>
                            <td th:text="${message}">
                                Something went wrong
                            </td>
                        </tr>
                        <tr>
                            <th>Detail</th>
                            <td th:text="${detail}">
                                Exception detail
                            </td>
                        </tr>
                        <tr>
                            <th>Path</th>
                            <td th:text="${path}">
                                /books
                            </td>
                        </tr>
                        <tr>
                            <th>Timestamp</th>
                            <td th:text="${timestamp}">
                                2026-06-17T10:00:00
                            </td>
                        </tr>
                        </tbody>
                    </table>

                    <div class="d-flex gap-2">
                        <a th:href="@{/}"
                           class="btn btn-primary">
                            Về màn hình chính
                        </a>
                        <button class="btn btn-outline-secondary"
                                onclick="history.back()">
                            Quay trở lại
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
