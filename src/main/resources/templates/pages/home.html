<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ</title>
</head>

<body>
<div layout:fragment="content">

    <!-- ===== PHẦN 1: HERO BANNER + SEARCH ===== -->
    <div class="d-flex align-items-center justify-content-center w-100"
         style="background: linear-gradient(rgba(0,0,0,0.28), rgba(0,0,0,0.28)), url('/images/fpt-home.jpg') center bottom / cover no-repeat; min-height: 500px;">
        <div class="rounded-3 p-4 w-100" style="background: rgba(243, 112, 33, 0.88); max-width: 680px;">
            <h2 class="text-white fw-bold fs-4 mb-3 text-center">
                <i class="bi bi-book me-2"></i>Tìm kiếm sách
            </h2>
            <!-- =====SEARCH kiếm dính lên URL /books?===== -->
            <form method="get" th:action="@{/books}">
                <div class="input-group mb-3 shadow-sm">
                    <select name="searchType" class="form-select border-0" style="max-width: 140px;">
                        <option value="title" th:selected="${searchType == 'title' or searchType == null}">Tiêu đề</option>
                        <option value="author" th:selected="${searchType == 'author'}">Tác giả</option>
                        <option value="publisher" th:selected="${searchType == 'publisher'}">Nhà xuất bản</option>
                        <option value="isbn" th:selected="${searchType == 'isbn'}">ISBN</option>
                    </select>

                    <input type="text" name="keyword" class="form-control border-0" placeholder="Nhập từ khoá tìm kiếm..." th:value="${keyword}"/>

                    <button type="submit" class="btn text-white fw-bold px-4" style="background-color: #c44f00;">
                        <i class="bi bi-search me-1"></i> Tìm kiếm
                    </button>
                </div>

                <div class="text-center small">
                    <a th:href="@{/borrow-requests}" class="text-white text-decoration-none">Yêu cầu mượn</a>
                    <span class="text-white-50 mx-2">|</span>
                    <a th:href="@{/new-book-requests}" class="text-white text-decoration-none">Đề xuất sách mới</a>
                    <span class="text-white-50 mx-2">|</span>
                    <a th:href="@{/borrow-history}" class="text-white text-decoration-none">Lịch sử mượn</a>
                </div>
            </form>
        </div>
    </div>

    <!-- ===== PHẦN 2: DANH SÁCH SÁCH CÓ PHÂN TRANG ===== -->
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <span class="fs-4 fw-bold text-dark pb-2 border-bottom border-3 d-inline-block mb-4" style="border-color: #f37021 !important;">
                    <i class="bi bi-grid me-2" style="color:#f37021"></i>
                    <span th:if="${keyword != null and keyword != ''}">
                        Kết quả tìm kiếm cho: "<span th:text="${keyword}" class="text-warning"></span>"
                    </span>
                    <span th:if="${keyword == null or keyword == ''}">Danh sách sách</span>
                </span>
            </div>
            <div class="text-muted small" th:if="${bookPage.totalElements > 0}">
                Tổng cộng <strong th:text="${bookPage.totalElements}"></strong> cuốn sách
            </div>
        </div>

        <div th:if="${keyword != null and keyword != ''}" class="mb-3">
            <a th:href="@{/books}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-x-circle me-1"></i> Xoá tìm kiếm, xem tất cả
            </a>
        </div>

        <div th:if="${#lists.isEmpty(books)}" class="text-center py-5">
            <i class="bi bi-search display-4 text-muted d-block mb-3"></i>
            <p class="text-muted fs-5">Không tìm thấy sách phù hợp.</p>
            <a th:href="@{/books}" class="btn btn-outline-primary mt-2">Xem tất cả sách</a>
        </div>

        <div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-3" th:if="${!#lists.isEmpty(books)}">
            <div class="col" th:each="book : ${books}">
                <div class="card h-100 shadow-sm border-light">
                    <div class="bg-light d-flex align-items-center justify-content-center overflow-hidden" style="height: 210px;">
                        <img th:if="${book.bookCoverUrl != null}" th:src="${book.bookCoverUrl}" th:alt="${book.title}" class="w-100 h-100 object-fit-cover"/>
                        <i class="bi bi-book text-muted display-4" th:if="${book.bookCoverUrl == null}"></i>
                    </div>

                    <div class="card-body d-flex flex-column p-3">
                        <div class="fw-bold text-dark mb-1" style="font-size: 0.88rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.35;" th:text="${book.title}">Tên sách</div>
                        <div class="text-muted small mb-auto text-truncate" style="font-size: 0.76rem;" th:text="${book.publisher != null ? book.publisher : 'Chưa có thông tin'}"></div>

                        <div class="mt-2 small">
                            <span th:if="${book.availableCopies > 0}" class="badge bg-success">
                                <i class="bi bi-check-circle me-1"></i>Còn <span th:text="${book.availableCopies}"></span> bản
                            </span>
                            <span th:if="${book.availableCopies == 0}" class="badge bg-secondary">
                                <i class="bi bi-x-circle me-1"></i> Hết bản
                            </span>
                        </div>

                        <a th:href="@{/books/{id}(id=${book.bookId})}" class="btn text-white btn-sm w-100 mt-2" style="background-color: #f37021; border-color: #f37021;">
                            Xem chi tiết
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== PHÂN TRANG ===== -->
        <div class="d-flex justify-content-between align-items-center mt-4" th:if="${!#lists.isEmpty(books)}">
            <div class="text-muted small">
                Trang <strong th:text="${bookPage.number + 1}"></strong> / <strong th:text="${bookPage.totalPages}"></strong>
            </div>

            <nav th:if="${bookPage.totalPages > 1}">
                <ul class="pagination mb-0">
                    <li class="page-item" th:classappend="${bookPage.first} ? 'disabled'">
                        <a class="page-link text-dark" th:href="@{/books(page=${bookPage.number - 1}, keyword=${keyword}, searchType=${searchType})}">
                            <i class="bi bi-chevron-left"></i> Trước
                        </a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, bookPage.totalPages - 1)}" th:classappend="${i == bookPage.number} ? 'active'">
                        <a class="page-link" th:style="${i == bookPage.number ? 'background-color: #f37021; border-color: #f37021; color: white;' : 'color: #f37021;'}" th:text="${i + 1}" th:href="@{/books(page=${i}, keyword=${keyword}, searchType=${searchType})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${bookPage.last} ? 'disabled'">
                        <a class="page-link text-dark" th:href="@{/books(page=${bookPage.number + 1}, keyword=${keyword}, searchType=${searchType})}">
                            Sau <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</body>
</html>
