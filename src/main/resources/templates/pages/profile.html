<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <meta charset="UTF-8">
    <title>Thông tin cá nhân</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div class="card shadow-sm">
            <div class="card-header d-flex align-items-center gap-2">
                <i class="bi bi-person-circle fs-5 text-primary"></i>
                <h4 class="mb-0">Thông tin cá nhân</h4>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <h6 class="text-muted mb-3">Thông tin tài khoản</h6>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Họ và tên</label>
                            <p class="form-control-plaintext" th:text="${user.fullName}">Nguyễn Văn A</p>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mã sinh viên</label>
                            <p class="form-control-plaintext" th:text="${user.code}">HE190797</p>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <p class="form-control-plaintext" th:text="${user.email}">example@fpt.edu.vn</p>
                        </div>
                    </div>

                    <div class="col-md-5">
                        <h6 class="text-muted mb-3">Thông tin liên hệ</h6>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Số điện thoại</label>
                            <p class="form-control-plaintext"
                               th:text="${user.phone != null ? user.phone : 'Chưa cập nhật'}">
                                0987654321
                            </p>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Địa chỉ</label>
                            <p class="form-control-plaintext"
                               th:text="${user.address != null ? user.address : 'Chưa cập nhật'}">
                                Hà Nội
                            </p>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Vai trò</label>
                            <p class="form-control-plaintext" th:text="${user.role}">READER</p>
                        </div>
                    </div>

                    <div class="col-md-3 text-center border-start d-flex flex-column align-items-center justify-content-start pt-3">
                        <h6 class="text-muted mb-3 w-100 text-center">Ảnh đại diện</h6>
                        <div class="position-relative mb-3">
                            <img th:src="${user.avatarUrl != null && user.avatarUrl != '' ? user.avatarUrl : 'https://placehold.co/150'}"
                                 alt="Avatar"
                                 class="rounded-circle img-thumbnail shadow-sm"
                                 style="width: 150px; height: 150px; object-fit: cover;">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
