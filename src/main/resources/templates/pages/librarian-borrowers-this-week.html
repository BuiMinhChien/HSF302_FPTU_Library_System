<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <meta charset="UTF-8">
    <title>Người mượn sách tuần này (Thủ thư)</title>
</head>

<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-calendar2-check-fill fs-5 text-dark"></i>
                    <h4 class="mb-0 text-dark fw-bold">Danh sách chờ nhận sách</h4>
                </div>
            </div>

            <div class="card-body">
                <!-- Form Tìm kiếm & Lọc -->
                <form method="get" th:action="@{/librarian/borrowers-this-week}" class="row g-3 mb-4 bg-light p-3 rounded border">
                    <div class="col-md-8">
                        <label class="form-label fw-bold text-muted small">Từ khóa</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                            <input type="text" name="keyword" class="form-control"
                                   th:value="${keyword}" placeholder="Tên SV, Mã SV, Tên sách...">
                        </div>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-funnel-fill me-1"></i> Tìm kiếm
                        </button>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <a th:href="@{/librarian/borrowers-this-week}" class="btn btn-outline-secondary w-100">Xóa lọc</a>
                    </div>
                </form>

                <!-- Bảng danh sách -->
                <div class="table-responsive">
                    <table class="table table-hover align-middle border">
                        <thead class="table-light">
                        <tr>
                            <th>STT</th>
                            <th>Sinh viên mượn</th>
                            <th>Thông tin sách</th>
                            <th>Ngày duyệt</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(requests)}">
                            <td colspan="6" class="text-center text-muted py-5">
                                <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                                Không có yêu cầu nào đang chờ nhận sách.
                            </td>
                        </tr>
                        <tr th:each="req, stat : ${requests}">
                            <td class="fw-bold text-muted" th:text="${requestPage.number * requestPage.size + stat.count}"></td>

                            <!-- Thông tin người mượn -->
                            <td>
                                <div class="fw-bold text-primary" th:text="${req.username}"></div>
                                <div class="small text-muted"><i class="bi bi-person-badge me-1"></i><span th:text="${req.studentCode}"></span></div>
                            </td>

                            <!-- Thông tin sách -->
                            <td>
                                <div class="fw-bold" th:text="${req.bookTitle}"></div>
                                <div class="small text-muted">Mã bản sao: <span class="badge bg-secondary" th:text="${req.reservedBookCopyBarcode ?: 'N/A'}"></span></div>
                            </td>

                            <!-- Ngày duyệt -->
                            <td>
                                <div th:if="${req.approvedDate != null}">
                                    <div th:text="${#temporals.format(req.approvedDate, 'dd/MM/yyyy')}"></div>
                                    <div class="small text-muted" th:text="${#temporals.format(req.approvedDate, 'HH:mm')}"></div>
                                </div>
                            </td>

                            <!-- Trạng thái -->
                            <td>
                                <span class="badge bg-warning-subtle text-warning border border-warning-subtle px-2 py-1">
                                    <i class="bi bi-clock-history me-1"></i> Đang chờ lấy sách
                                </span>
                            </td>
                            
                            <!-- Nút Xác nhận giao sách -->
                            <td>
                                <form th:action="@{/librarian/borrowers-this-week/{id}/issue(id=${req.requestId})}" method="post">
                                    <button type="submit" class="btn btn-sm btn-success fw-bold" onclick="return confirm('Bạn có chắc chắn muốn xác nhận đã giao sách cho sinh viên này không?');">
                                        <i class="bi bi-check-circle me-1"></i> Xác nhận giao sách
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Phân trang -->
                <div class="d-flex justify-content-between align-items-center mt-3" th:if="${requestPage.totalElements > 0}">
                    <div class="text-muted small">
                        Hiển thị <span th:text="${requestPage.number * requestPage.size + 1}"></span> -
                        <span th:text="${requestPage.number * requestPage.size + requests.size()}"></span>
                        / <span th:text="${requestPage.totalElements}"></span> dòng
                    </div>
                    <nav th:if="${requestPage.totalPages > 1}">
                        <ul class="pagination mb-0">
                            <li class="page-item" th:classappend="${requestPage.first} ? 'disabled'">
                                <a class="page-link" th:href="@{/librarian/borrowers-this-week(page=${requestPage.number - 1}, keyword=${keyword})}">Trước</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, requestPage.totalPages - 1)}" th:classappend="${i == requestPage.number} ? 'active'">
                                <a class="page-link" th:text="${i + 1}" th:href="@{/librarian/borrowers-this-week(page=${i}, keyword=${keyword})}"></a>
                            </li>
                            <li class="page-item" th:classappend="${requestPage.last} ? 'disabled'">
                                <a class="page-link" th:href="@{/librarian/borrowers-this-week(page=${requestPage.number + 1}, keyword=${keyword})}">Sau</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 start-0 p-3">
        <!-- Success Toast -->
        <div th:if="${success}" id="successToast" class="toast text-bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${success}"></span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
        <!-- Error Toast -->
        <div th:if="${error}" id="errorToast" class="toast text-bg-danger border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${error}"></span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const successToast = document.getElementById('successToast');
            if (successToast) {
                new bootstrap.Toast(successToast, {delay: 5000}).show();
            }
            const errorToast = document.getElementById('errorToast');
            if (errorToast) {
                new bootstrap.Toast(errorToast, {delay: 5000}).show();
            }
        });
    </script>
</div>
</body>
</html>
