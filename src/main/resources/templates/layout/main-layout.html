<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - FPTU Library">FPTU Library</title>
    <!-- App Logo / Favicon -->
    <link rel="icon" type="image/png" th:href="@{/images/app-logo.png}">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<!-- ==================== HEADER ==================== -->
<header class="bg-white border-bottom shadow-sm">
    <div class="container">
        <div class="d-flex align-items-center justify-content-between py-2">
            <!-- Logo & Brand -->
            <a th:href="@{/}" class="d-flex align-items-center text-decoration-none">
                <img th:src="@{/images/fpt-logo.png}" alt="FPTU Logo" height="50" class="me-2">
                <div>
                    <span class="fw-bold fs-5" style="color: #f37021">Thư viện trường Đại học FPT</span><br>
                    <small class="text-muted">FPT University</small>
                </div>
            </a>

            <!-- Header Info & Actions -->
            <div class="d-flex align-items-center gap-3">
                <small class="text-muted d-none d-md-block">
                    <i class="bi bi-clock me-1"></i>
                    Mở cửa: 08:15 - 21:00 (Ngày trong tuần) | 08:00 - 17:00 (Cuối tuần)
                </small>

                <!-- User Actions -->
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn btn-outline-primary btn-sm">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Login
                    </a>
                </div>
                <div sec:authorize="isAuthenticated()" class="dropdown">
                    <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button"
                            data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">User</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{/profile}">
                            <i class="bi bi-person me-2"></i>Hồ sơ cá nhân
                        </a></li>
                        <li><a class="dropdown-item" th:href="@{/change-password}">
                            <i class="bi bi-lock me-2"></i>Đổi mật khẩu
                        </a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="px-3">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- ==================== NAVBAR ==================== -->
<nav class="navbar navbar-expand-lg navbar-dark"
     style="background-color: #f37021;">
    <div class="container">
        <div class="w-100" th:replace="~{fragments/navbar :: navbar}"></div>
    </div>
</nav>

<!-- ==================== MAIN CONTENT ==================== -->
<main class="flex-grow-1 py-4">
    <div class="container" layout:fragment="content">
        <p>Main content goes here</p>
    </div>
</main>

<!-- ==================== FOOTER ==================== -->
<footer class="bg-dark text-white pt-4 pb-3 mt-auto">
    <div class="container">
        <div class="text-center small text-white-50">
            <p class="mb-0">&copy; 2026 Bản quyền thuộc về hệ thống Thư viện trường Đại học FPT</p>
        </div>
    </div>
</footer>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
