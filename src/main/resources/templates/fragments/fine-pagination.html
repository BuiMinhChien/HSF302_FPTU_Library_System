<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="readerPagination(finePage, search)" class="d-flex justify-content-center mt-3">
    <nav th:if="${finePage.totalElements > 0}">
        <ul class="pagination mb-0">
            <li class="page-item" th:classappend="${finePage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/reader/fines(
                        page=${finePage.number - 1},
                        size=${search.size},
                        bookTitle=${search.bookTitle},
                        status=${search.status}
                   )}">
                    Trước
                </a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, finePage.totalPages - 1)}"
                th:classappend="${i == finePage.number} ? 'active'">
                <a class="page-link"
                   th:text="${i + 1}"
                   th:href="@{/reader/fines(
                        page=${i},
                        size=${search.size},
                        bookTitle=${search.bookTitle},
                        status=${search.status}
                   )}">
                </a>
            </li>
            <li class="page-item" th:classappend="${finePage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/reader/fines(
                        page=${finePage.number + 1},
                        size=${search.size},
                        bookTitle=${search.bookTitle},
                        status=${search.status}
                   )}">
                    Sau
                </a>
            </li>
        </ul>
    </nav>
</div>

</body>
</html>
